{% extends "base.html" %}

{% block title %}Login - Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock fs-4 text-white"></i>
                    </div>
                    <h3 class="fw-bold text-gray-800 mb-1">Welcome back</h3>
                    <p class="text-muted small">Sign in to your admin account</p>
                </div>

                {% if request.query_params.get('error') == 'invalid_credentials' %}
                <div class="alert alert-danger border-0" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    Invalid credentials. Please try again.
                </div>
                {% endif %}

                <form method="post" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username or Email</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-transparent">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" id="username" name="username" 
                                   placeholder="Enter your username" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-transparent">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" 
                                   placeholder="Enter your password" required>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Sign In
                        </button>
                    </div>
                </form>
                
                <div class="text-center">
                    <small class="text-muted">
                        <i class="bi bi-shield-check me-1"></i>
                        Secure admin access
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
